<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Eaglercraft 1.20</title>
  <style>
    /* Clean custom styling for your strict password prompt */
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      overflow: hidden;
    }
    .login-box {
      text-align: center;
      background-color: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      border: 3px solid #4CAF50;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .input-field {
      padding: 12px;
      font-size: 16px;
      border: 2px solid #4CAF50;
      border-radius: 4px;
      background-color: #222;
      color: white;
      margin-bottom: 15px;
      width: 220px;
      text-align: center;
    }
    .btn {
      padding: 10px 24px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn:hover {
      background-color: #45a049;
    }
    #game-container {
      display: none;
      width: 100%;
      height: 100vh;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

  <!-- Screen 1: The Login System -->
  <div id="lock-screen" class="login-box">
    <h2 style="color: #4CAF50; margin-top: 0;">🔒 Security Access</h2>
    <p style="font-size: 14px; color: #aaa;">You have 1 attempt. Capital letters matter.</p>
    <input type="password" id="pass-entry" class="input-field" placeholder="Enter secret code"><br>
    <button onclick="checkPass()" class="btn">Unlock Game</button>
  </div>

  <!-- Screen 2: Hidden Game Container holding the 1.20 Raw Link -->
  <div id="game-container">
    <iframe id="game-frame" allow="autoplay; gamepad; keyboard" allowfullscreen="true" src=""></iframe>
  </div>

  <script>
    function checkPass() {
      // Your exact case-sensitive pins
      var allowedCodes = ["uno", "can", "dont", "Furrowfield123"];
      var entered = document.getElementById("pass-entry").value.trim();

      if (allowedCodes.includes(entered)) {
        // SUCCESS: Hides login box and forces iframe to fetch your raw 1.20 game data link safely
        document.getElementById("lock-screen").style.display = "none";
        document.getElementById("game-container").style.display = "block";
        
        // This converted GitHack proxy link forces the 1.20 raw code to launch as a real playable game
        document.getElementById("game-frame").src = "https://githack.com";
      } else {
        // FAIL: Shows your custom message and boots them to Google
        alert("❌ Ask Lloyd for code");
        window.top.location.href = "https://google.com";
      }
    }
  </script>

</body>
</html>
