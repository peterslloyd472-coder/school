<!DOCTYPE html>
<html>
<head>
  <title>Eaglercraft</title>
  <style>
    /* Styling for a custom login screen that won't trigger Firefox blocks */
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      font-family: Arial, sans-serif;
    }
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }
    .input-box {
      padding: 12px;
      font-size: 16px;
      border: 2px solid #4CAF50;
      border-radius: 4px;
      background-color: #222;
      color: white;
      margin-bottom: 10px;
      width: 250px;
      text-align: center;
    }
    .submit-btn {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .submit-btn:hover {
      background-color: #45a049;
    }
    #game-container {
      display: none; /* Stays completely hidden until the correct code is entered */
      margin: 20px 0px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Custom Interface for entering the password -->
  <div id="login-screen">
    <h2 style="color: #4CAF50;">🔒 Strict Security Access</h2>
    <p>You have exactly 1 attempt to enter an approved pin.</p>
    <input type="password" id="user-code" class="input-box" placeholder="Enter strict secret code">
    <button onclick="verifyCode()" class="submit-btn">Unlock Game</button>
  </div>

  <!-- Hidden Game Container -->
  <div id="game-container">
    <iframe id="game-frame" allow="autoplay; gamepad; keyboard" allowfullscreen="true" height="600" loading="lazy" style="border-radius: 8px; border: 4px solid #4CAF50; box-shadow: 0 4px 8px rgba(0,0,0,0.2);" width="100%">
    </iframe>
  </div>

  <script>
    function verifyCode() {
      // Your exact case-sensitive allowed codes list
      var allowedCodes = ["uno", "can", "dont", "Furrowfield123"]; 
      var enteredValue = document.getElementById("user-code").value.trim();

      if (allowedCodes.includes(enteredValue)) {
        // If correct, hide the login box and load the iframe source code safely
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("game-container").style.display = "block";
        document.getElementById("game-frame").src = "https://github.io";
      } else {
        // Your custom alert message that kicks them out on a single failed guess
        alert("❌ Ask Lloyd for code");
        window.location.href = "https://google.com";
      }
    }
  </script>

</body>
</html>
